name: Wheels

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pinned because manylinux2014_x86_64:latest no longer ships cp38.
  MANYLINUX2014_X86_64_IMAGE: quay.io/pypa/manylinux2014_x86_64@sha256:66d0049056d8744efef8f7e973d07acd548a28cda5cf5f6e4040847e34e3bbcc

jobs:
  build-wheels:
    name: Build wheels (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15-intel
          - macos-latest
          - windows-latest
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v4
      - name: Set target triple
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)
              echo "TARGET=x86_64-unknown-linux-gnu" >> "$GITHUB_ENV"
              ;;
            macos-15-intel)
              echo "TARGET=x86_64-apple-darwin" >> "$GITHUB_ENV"
              ;;
            macos-latest)
              echo "TARGET=aarch64-apple-darwin" >> "$GITHUB_ENV"
              ;;
            windows-latest)
              echo "TARGET=x86_64-pc-windows-msvc" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown OS ${{ matrix.os }}"
              exit 1
              ;;
          esac
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set Python interpreter
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            PYTAG="${{ matrix.python-version }}"
            PYTAG="${PYTAG/.}"
            echo "PYBIN=/opt/python/cp${PYTAG}-cp${PYTAG}/bin/python" >> "$GITHUB_ENV"
          else
            echo "PYBIN=python" >> "$GITHUB_ENV"
          fi
      - name: Build wheels (Linux)
        if: matrix.os == 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter ${{ env.PYBIN }}
          working-directory: atompack-py
          target: ${{ env.TARGET }}
          manylinux: 2_17
          container: ${{ env.MANYLINUX2014_X86_64_IMAGE }}
      - name: Build wheels (non-Linux)
        if: matrix.os != 'ubuntu-latest'
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter ${{ env.PYBIN }}
          working-directory: atompack-py
          target: ${{ env.TARGET }}
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ env.TARGET }}-py${{ matrix.python-version }}
          path: atompack-py/dist

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: atompack-py
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: atompack-py/dist
