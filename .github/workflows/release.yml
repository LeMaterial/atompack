name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to validate (e.g., v0.2.0). Leave blank to skip validation on branch runs."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-version:
    name: Validate tag version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag matches versions
        run: |
          python - <<'PY'
          import os
          import re
          import pathlib
          import sys
          import tomllib

          input_tag = os.environ.get("INPUT_TAG", "").strip()
          ref = os.environ.get("GITHUB_REF", "")
          tag = input_tag or os.environ.get("GITHUB_REF_NAME", "")
          is_tag_ref = ref.startswith("refs/tags/")
          if not input_tag and not is_tag_ref:
            print("Skipping version check: workflow_dispatch ran on a non-tag ref.")
            sys.exit(0)
          tag_version = tag[1:] if tag.startswith("v") else tag
          if not tag_version:
            print("Missing tag version.")
            sys.exit(1)

          root = pathlib.Path(".")
          pyproject = root / "atompack-py" / "pyproject.toml"
          cargo = root / "Cargo.toml"
          init_py = root / "atompack-py" / "python" / "atompack" / "__init__.py"

          py_version = tomllib.loads(pyproject.read_text())["project"]["version"]
          cargo_data = tomllib.loads(cargo.read_text())
          if "package" in cargo_data and "version" in cargo_data["package"]:
            cargo_version = cargo_data["package"]["version"]
          else:
            cargo_version = cargo_data["workspace"]["package"]["version"]
          init_text = init_py.read_text()
          match = re.search(r'__version__\s*=\s*["\']([^"\']+)["\']', init_text)
          if not match:
            print("Could not find __version__ in atompack-py/python/atompack/__init__.py")
            sys.exit(1)
          init_version = match.group(1)

          errors = []
          if tag_version != py_version:
            errors.append(f"Tag {tag_version} != atompack-py/pyproject.toml version {py_version}")
          if tag_version != cargo_version:
            errors.append(f"Tag {tag_version} != Cargo.toml version {cargo_version}")
          if tag_version != init_version:
            errors.append(
              "Tag "
              f"{tag_version} != atompack-py/python/atompack/__init__.py __version__ {init_version}"
            )

          if errors:
            print("\\n".join(errors))
            sys.exit(1)

          print(f"Tag {tag_version} matches pyproject and Cargo.toml.")
          PY

  build-wheels:
    name: Build wheels (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-15-intel
          - macos-latest
          - windows-latest
        python-version:
          - "3.8"
          - "3.9"
          - "3.10"
          - "3.11"
          - "3.12"
    steps:
      - uses: actions/checkout@v4
      - name: Set target triple
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)
              echo "TARGET=x86_64-unknown-linux-gnu" >> "$GITHUB_ENV"
              ;;
            macos-15-intel)
              echo "TARGET=x86_64-apple-darwin" >> "$GITHUB_ENV"
              ;;
            macos-latest)
              echo "TARGET=aarch64-apple-darwin" >> "$GITHUB_ENV"
              ;;
            windows-latest)
              echo "TARGET=x86_64-pc-windows-msvc" >> "$GITHUB_ENV"
              ;;
            *)
              echo "Unknown OS ${{ matrix.os }}"
              exit 1
              ;;
          esac
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Set Python interpreter
        shell: bash
        run: |
          if [[ "${{ matrix.os }}" == "ubuntu-latest" ]]; then
            PYTAG="${{ matrix.python-version }}"
            PYTAG="${PYTAG/.}"
            echo "PYBIN=/opt/python/cp${PYTAG}-cp${PYTAG}/bin/python" >> "$GITHUB_ENV"
          else
            echo "PYBIN=python" >> "$GITHUB_ENV"
          fi
      - name: Build wheels
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist --interpreter ${{ env.PYBIN }}
          working-directory: atompack-py
          target: ${{ env.TARGET }}
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ env.TARGET }}-py${{ matrix.python-version }}
          path: atompack-py/dist

  build-sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    needs: validate-version
    steps:
      - uses: actions/checkout@v4
      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: atompack-py
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: atompack-py/dist

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs:
      - build-wheels
      - build-sdist
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/atompack-db
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - publish-pypi
      - build-wheels
      - build-sdist
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
