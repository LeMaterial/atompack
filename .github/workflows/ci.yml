name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (fmt, clippy, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Run checks
        run: make ci-rust

  python:
    name: Python (ruff, pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.16"
          enable-cache: true
      
      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Run checks
        run: make ci-py

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs:
      - rust
      - python
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.9.16"
          enable-cache: true

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: llvm-tools-preview

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Run Python coverage
        run: make py-coverage

      - name: Run Rust coverage
        run: make rust-coverage

      - name: Upload to Codecov (pull requests)
        if: github.event_name == 'pull_request'
        uses: codecov/codecov-action@v5
        with:
          files: atompack-py/coverage/python-coverage.xml,coverage/rust.lcov
          fail_ci_if_error: true
          verbose: true

      - name: Upload to Codecov (pushes)
        if: github.event_name == 'push'
        uses: codecov/codecov-action@v5
        with:
          files: atompack-py/coverage/python-coverage.xml,coverage/rust.lcov
          fail_ci_if_error: true
          use_oidc: true
          verbose: true

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: |
            atompack-py/coverage
            coverage
