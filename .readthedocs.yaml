version: 2
build:
  os: ubuntu-22.04
  tools:
    python: '3.11'
  commands:
  - asdf plugin add uv
  - asdf install uv latest
  - asdf global uv latest
  - uv sync --project atompack-py --group docs --locked
  - curl -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
  - . "$HOME/.cargo/env" && cargo doc --workspace --no-deps
  - uv run --project atompack-py --group docs --locked sphinx-build -M html docs/source $READTHEDOCS_OUTPUT
  - mkdir -p "$READTHEDOCS_OUTPUT/html/rustdoc"
  - cp -r target/doc/* "$READTHEDOCS_OUTPUT/html/rustdoc/"
